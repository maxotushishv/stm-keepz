<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>მგზავრთა სია</title>

<script src="data.js"></script>

<style>
body{
  font-family: Arial;
  margin:0;
  padding:20px;
}

.print{
  width:100%;
}

h2{
  text-align:center;
  margin-bottom:10px;
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}

th, td{
  border:1px solid #000;
  padding:4px;
  text-align:left;
}

th{
  background:#eee;
}

@media print {
  button{display:none;}
}
</style>
</head>

<body>

<button onclick="window.print()">🖨️ ბეჭდვა</button>

<h2>მგზავრთა სია</h2>

<table>
<thead>
<tr>
  <th>#</th>
  <th>სახელი გვარი</th>
  <th>პასპორტი</th>
  <th>ტური</th>
</tr>
</thead>

<tbody id="tbl"></tbody>
</table>

<script>
const params = new URLSearchParams(location.search);
const tourId = Number(params.get("tourId"));

const bookings = STM.getBookings().filter(b => b.tourId === tourId);

let rows = [];
bookings.forEach(b=>{
  b.passengers.forEach(p=>{
    rows.push({
      name: p.name + " " + p.surname,
      passport: p.passport || p.pid || '',
      tour: b.tour
    });
  });
});

const tbody = document.getElementById("tbl");

tbody.innerHTML = rows.map((r,i)=>`
<tr>
  <td>${i+1}</td>
  <td>${r.name}</td>
  <td>${r.passport}</td>
  <td>${r.tour}</td>
</tr>
`).join('');
</script>

</body>
</html>
