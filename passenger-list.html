<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Passenger List</title>

<script src="data.js"></script>

<style>
@page {
  size: A4;
  margin: 0;
}

body{
  margin:0;
  padding:0;
}

.page{
  position:relative;
  width:210mm;
  height:297mm;

  background:url('bekatour passanger list.jpg') no-repeat center;
  background-size:100% 100%;

  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* მთელი რიგი */
.row{
  position:absolute;
  left:23mm; /* 👉 მარჯვნივ */
  width:175mm;
  display:flex;
  font-size:10px;
  font-family:Arial;
}

/* სახელი */
.c2{ width:65mm; }

/* პასპორტი */
.c3{ 
  width:40mm;
  position:relative;
  left:-4mm; /* 👉 უკან გაწევა */
}

/* ტური */
.c4{ 
  width:50mm;
  position:relative;
  top:1mm; /* 👉 დაბლა */
}

/* თანხა */
.c5{ width:25mm; }

</style>
</head>

<body>

<div class="page" id="page"></div>

<script>

/* 🔴 ქართული → რუსული */
function geoToRus(text){
  const map = {
    'ა':'а','ბ':'б','გ':'г','დ':'д','ე':'е','ვ':'в','ზ':'з','თ':'т',
    'ი':'и','კ':'к','ლ':'л','მ':'м','ნ':'н','ო':'о','პ':'п','ჟ':'ж',
    'რ':'р','ს':'с','ტ':'т','უ':'у','ფ':'ф','ქ':'к','ღ':'г','ყ':'к',
    'შ':'ш','ჩ':'ч','ც':'ц','ძ':'дз','წ':'ц','ჭ':'ч','ხ':'х','ჯ':'дж','ჰ':'х'
  };
  return text.split('').map(l => map[l] || l).join('');
}

/* TOUR */
const params = new URLSearchParams(location.search);
const tourId = Number(params.get("tourId"));

const bookings = STM.getBookings().filter(b => b.tourId === tourId);

let rows = [];

bookings.forEach(b=>{
  b.passengers.forEach(p=>{
    rows.push({
      name: geoToRus(p.name + " " + p.surname),
      passport: p.passport || p.pid || '',
      tour: geoToRus(b.tour),
      amount: b.total || ''
    });
  });
});

const page = document.getElementById("page");

/* 👉 საერთო პოზიცია */
let startY = 65;

/* 🔥 მთავარი FIX — ხაზები რომ არ გაიქცეს */
const lineHeight = 5.2;

rows.forEach((r,i)=>{
  const row = document.createElement("div");
  row.className = "row";

  row.style.top = (startY + (i*lineHeight)) + "mm";

  row.innerHTML = `
    <div class="c2">${r.name}</div>
    <div class="c3">${r.passport}</div>
    <div class="c4">${r.tour}</div>
    <div class="c5">${r.amount}</div>
  `;

  page.appendChild(row);
});

window.onload = () => {
  setTimeout(()=>window.print(), 500);
};

</script>

</body>
</html>
