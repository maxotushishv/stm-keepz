<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Passenger List</title>

<script src="data.js"></script>

<style>
@page {
  size: A4;
  margin: 0;
}

body{
  margin:0;
  padding:0;
}

.page{
  position:relative;
  width:210mm;
  height:297mm;

  /* 👇 შენი სურათი აქ ჩასვი */
  background:url('bekatour passanger list.jpg') no-repeat center;
  background-size:100% 100%;
}

/* ტექსტის სტილი */
.txt{
  position:absolute;
  font-size:10px;
  font-family:Arial;
}

/* ცხრილის რიგები */
.row{
  position:absolute;
  left:10mm;
  width:190mm;
  display:flex;
  font-size:10px;
}

/* სვეტები (გრაფები) */
.c1{ width:10mm; }   /* # */
.c2{ width:50mm; }   /* სახელი */
.c3{ width:35mm; }   /* პასპორტი */
.c4{ width:55mm; }   /* ტური */
.c5{ width:40mm; }   /* თანხა */
</style>
</head>

<body>

<div class="page" id="page"></div>

<script>
const params = new URLSearchParams(location.search);
const tourId = Number(params.get("tourId"));

const bookings = STM.getBookings().filter(b => b.tourId === tourId);

let rows = [];
bookings.forEach(b=>{
  b.passengers.forEach(p=>{
    rows.push({
      name: p.name + " " + p.surname,
      passport: p.passport || p.pid || '',
      tour: b.tour,
      amount: b.total || ''
    });
  });
});

const page = document.getElementById("page");

/* 🔥 Y პოზიციის დაწყება (პირველი ხაზი) */
let startY = 70; // mm — აქ ვასწორებთ

rows.forEach((r,i)=>{
  const row = document.createElement("div");
  row.className = "row";

  row.style.top = (startY + (i*5)) + "mm"; // ხაზებს შორის დაშორება

  row.innerHTML = `
    <div class="c1">${i+1}</div>
    <div class="c2">${r.name}</div>
    <div class="c3">${r.passport}</div>
    <div class="c4">${r.tour}</div>
    <div class="c5">${r.amount}</div>
  `;

  page.appendChild(row);
});

/* ავტომატური ბეჭდვა */
window.onload = () => setTimeout(()=>window.print(),500);
</script>

</body>
</html>
