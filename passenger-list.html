<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Passenger List</title>

<script src="data.js"></script>

<style>
@page {
  size: A4;
  margin: 0;
}

body{
  margin:0;
  padding:0;
}

/* მთავარი ფურცელი */
.page{
  position:relative;
  width:210mm;
  height:297mm;

  background:url('bekatour passanger list.jpg') no-repeat center;
  background-size:100% 100%;

  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}

/* თითო ხაზის სტილი */
.row{
  position:absolute;
  left:15mm; /* 👉 მარჯვნივ გაწეული */
  width:180mm;
  display:flex;
  font-size:10px;
  font-family:Arial;
}

/* სვეტები */
.c2{ width:60mm; }   /* სახელი */
.c3{ width:40mm; }   /* პასპორტი */
.c4{ width:60mm; }   /* ტური */
.c5{ width:30mm; }   /* თანხა */

</style>
</head>

<body>

<div class="page" id="page"></div>

<script>

/* 🔤 ქართული → "რუსული/ლათინური" ტრანსლიტი */
function geoToRus(text){
  const map = {
    'ა':'a','ბ':'b','გ':'g','დ':'d','ე':'e','ვ':'v','ზ':'z','თ':'t',
    'ი':'i','კ':'k','ლ':'l','მ':'m','ნ':'n','ო':'o','პ':'p','ჟ':'zh',
    'რ':'r','ს':'s','ტ':'t','უ':'u','ფ':'f','ქ':'k','ღ':'g','ყ':'q',
    'შ':'sh','ჩ':'ch','ც':'ts','ძ':'dz','წ':'ts','ჭ':'ch','ხ':'kh','ჯ':'j','ჰ':'h'
  };
  return text.split('').map(l => map[l] || l).join('');
}

/* tour id */
const params = new URLSearchParams(location.search);
const tourId = Number(params.get("tourId"));

/* მონაცემები */
const bookings = STM.getBookings().filter(b => b.tourId === tourId);

let rows = [];

bookings.forEach(b=>{
  b.passengers.forEach(p=>{
    rows.push({
      name: geoToRus(p.name + " " + p.surname),
      passport: p.passport || p.pid || '',
      tour: b.tour,
      amount: b.total || ''
    });
  });
});

const page = document.getElementById("page");

/* 🔥 პოზიცია (მაღლა აწეული) */
let startY = 65;

/* ჩაწერა */
rows.forEach((r,i)=>{
  const row = document.createElement("div");
  row.className = "row";

  row.style.top = (startY + (i*5)) + "mm";

  row.innerHTML = `
    <div class="c2">${r.name}</div>
    <div class="c3">${r.passport}</div>
    <div class="c4">${r.tour}</div>
    <div class="c5">${r.amount}</div>
  `;

  page.appendChild(row);
});

/* ავტომატური ბეჭდვა */
window.onload = () => {
  setTimeout(()=>window.print(), 500);
};

</script>

</body>
</html>
