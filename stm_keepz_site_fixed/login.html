<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STM Georgia — შესვლა</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans Georgian',sans-serif;
  min-height:100vh;
  background:#0f172a;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  overflow:hidden;
  position:relative;
}
/* animated background */
.bg-anim{
  position:fixed;inset:0;z-index:0;overflow:hidden;
}
.bg-orb{
  position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18;animation:orb 8s ease-in-out infinite;
}
.bg-orb:nth-child(1){width:500px;height:500px;background:#1a5fa8;top:-100px;left:-100px;animation-delay:0s;}
.bg-orb:nth-child(2){width:400px;height:400px;background:#1D9E75;bottom:-80px;right:-80px;animation-delay:3s;}
.bg-orb:nth-child(3){width:300px;height:300px;background:#6366f1;top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:1.5s;}
@keyframes orb{0%,100%{transform:scale(1) translate(0,0);}50%{transform:scale(1.15) translate(20px,-20px);}}

/* card */
.card{
  position:relative;z-index:1;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:24px;
  padding:40px 36px;
  width:100%;max-width:420px;
  box-shadow:0 24px 60px rgba(0,0,0,0.4);
}

/* logo */
.logo{text-align:center;margin-bottom:32px;}
.logo-circle{
  width:72px;height:72px;
  background:linear-gradient(135deg,#1a5fa8,#1D9E75);
  border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
  box-shadow:0 8px 24px rgba(26,95,168,0.4);
}
.logo-stm{font-family:'Montserrat',sans-serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-1px;}
.logo-stm span{color:#f5c842;}
.logo-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:4px;}
.logo-sub{font-size:13px;color:rgba(255,255,255,0.5);font-weight:600;}

/* form */
.fl{display:block;font-size:13px;font-weight:700;color:rgba(255,255,255,0.6);margin-bottom:7px;letter-spacing:0.5px;}
.fi-wrap{position:relative;margin-bottom:18px;}
.fi{
  width:100%;padding:14px 16px 14px 46px;
  background:rgba(255,255,255,0.08);
  border:1.5px solid rgba(255,255,255,0.12);
  border-radius:12px;
  font-size:16px;font-family:'Noto Sans Georgian',sans-serif;
  color:#fff;outline:none;
  transition:all 0.2s;
}
.fi::placeholder{color:rgba(255,255,255,0.3);}
.fi:focus{border-color:#6366f1;background:rgba(99,102,241,0.12);}
.fi-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:18px;opacity:0.5;
}
.fi-eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,0.4);
  cursor:pointer;font-size:18px;padding:2px;
}
.fi-eye:hover{color:rgba(255,255,255,0.8);}

/* submit */
.btn-login{
  width:100%;padding:15px;
  background:linear-gradient(135deg,#4F46E5,#6366f1);
  border:none;border-radius:12px;
  color:#fff;font-size:17px;font-weight:800;
  font-family:'Noto Sans Georgian',sans-serif;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 6px 20px rgba(99,102,241,0.4);
  margin-top:4px;
}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(99,102,241,0.5);}
.btn-login:active{transform:translateY(0);}
.btn-login:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

/* error */
.err{
  background:rgba(204,32,32,0.15);border:1.5px solid rgba(204,32,32,0.4);
  border-radius:10px;padding:11px 14px;
  color:#fca5a5;font-size:14px;font-weight:700;
  margin-bottom:16px;display:none;text-align:center;
}
.err.show{display:block;animation:shake 0.3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-8px);}75%{transform:translateX(8px);}}

/* role select */
.role-tabs{display:flex;gap:8px;margin-bottom:24px;background:rgba(255,255,255,0.06);border-radius:12px;padding:4px;}
.role-tab{
  flex:1;padding:9px;border-radius:9px;border:none;background:transparent;
  color:rgba(255,255,255,0.5);font-size:13px;font-weight:700;
  font-family:'Noto Sans Georgian',sans-serif;cursor:pointer;transition:all 0.2s;
}
.role-tab.active{background:rgba(255,255,255,0.14);color:#fff;}

/* footer */
.login-footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.25);}
</style>
</head>
<body>

<div class="bg-anim">
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-circle">
      <div class="logo-stm"><span>S</span>TM</div>
    </div>
    <div class="logo-title">STM Georgia</div>
    <div class="logo-sub">სისტემაში შესვლა</div>
  </div>

  <!-- Role tabs -->
  <div class="role-tabs">
    <button class="role-tab active" id="tab-admin" onclick="setRole('admin')">⚙️ ადმინი</button>
    <button class="role-tab" id="tab-cashier" onclick="setRole('cashier')">💰 სალარო</button>
  </div>

  <div class="err" id="err-msg">მომხმარებელი ან პაროლი არასწორია</div>

  <form onsubmit="doLogin(event)">
    <label class="fl">მომხმარებელი</label>
    <div class="fi-wrap">
      <span class="fi-icon">👤</span>
      <input class="fi" id="inp-user" type="text" placeholder="username" autocomplete="username" required>
    </div>

    <label class="fl">პაროლი</label>
    <div class="fi-wrap">
      <span class="fi-icon">🔒</span>
      <input class="fi" id="inp-pass" type="password" placeholder="••••••••" autocomplete="current-password" required>
      <button type="button" class="fi-eye" onclick="togglePass()" id="eye-btn">👁</button>
    </div>

    <button class="btn-login" id="login-btn" type="submit">შესვლა →</button>
  </form>

  <div class="login-footer">STM Georgia © 2025 · stm-bus.ge</div>
</div>

<script src="data.js"></script>
<script>
let _role = 'admin';

function setRole(r){
  _role = r;
  document.getElementById('tab-admin').classList.toggle('active', r==='admin');
  document.getElementById('tab-cashier').classList.toggle('active', r==='cashier');
}

function togglePass(){
  const inp = document.getElementById('inp-pass');
  const eye = document.getElementById('eye-btn');
  if(inp.type==='password'){ inp.type='text'; eye.textContent='🙈'; }
  else { inp.type='password'; eye.textContent='👁'; }
}

function showErr(msg){
  const el = document.getElementById('err-msg');
  el.textContent = msg||'მომხმარებელი ან პაროლი არასწორია';
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 3000);
}

function doLogin(e){
  e.preventDefault();
  const username = document.getElementById('inp-user').value.trim().toLowerCase();
  const password = document.getElementById('inp-pass').value;
  const btn = document.getElementById('login-btn');

  if(!username||!password){ showErr('შეავსეთ ყველა ველი'); return; }

  btn.disabled = true;
  btn.textContent = 'შემოწმება...';

  // Small delay for UX
  setTimeout(()=>{
    const users = STM.getUsers();
    const user = users.find(u =>
      u.username.toLowerCase() === username &&
      u.password === password &&
      u.active !== false
    );

    btn.disabled = false;
    btn.textContent = 'შესვლა →';

    if(!user){ showErr('მომხმარებელი ან პაროლი არასწორია'); return; }

    // Check role matches selected tab
    if(_role === 'admin' && user.role !== 'admin'){
      showErr('ადმინის წვდომა არ გაქვს'); return;
    }
    if(_role === 'cashier' && user.role !== 'cashier' && user.role !== 'admin'){
      showErr('სალაროს წვდომა არ გაქვს'); return;
    }

    // Save session
    sessionStorage.setItem('stm_session', JSON.stringify({
      username: user.username,
      displayName: user.displayName || user.username,
      role: user.role,
      loginTime: Date.now()
    }));

    // Redirect
    if(_role === 'admin') window.location.href = 'admin.html';
    else window.location.href = 'cashier.html';

  }, 400);
}

// If already logged in, redirect
const sess = sessionStorage.getItem('stm_session');
if(sess){
  try{
    const s = JSON.parse(sess);
    if(s.role === 'admin') window.location.href = 'admin.html';
    else window.location.href = 'cashier.html';
  }catch(_){}
}
</script>
</body>
</html>
